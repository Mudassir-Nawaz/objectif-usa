    logo: "/images/logo.png"
    cta_url: "/contact/"
  
  socials:
    facebook: "https://www.facebook.com/objectifusa"
    x: "https://x.com/objectif_usa"
    instagram: "https://www.instagram.com/usaobjectif/"
