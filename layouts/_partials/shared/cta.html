<!-- CTA Section -->
<div class='w-full {{ if eq .gradient "true" }}bg-linear-to-r from-0% to-100% from-blue to-red{{ else }}bg-blue{{ end }} pt-9 pb-12 md:py-2.5 {{ .class }}'>
    <div class='mx-auto px-4 {{ if eq .isSingle "true" }}max-w-290{{ else }}max-w-7xl{{ end }}'>
        <div class="flex flex-col md:flex-row items-center justify-between gap-8">
            <!-- Left Content - Info List -->
            <div class="flex-1 w-full md:w-auto">
                <div class="flex flex-col md:flex-row items-center gap-6">
                    {{ if ne .icon "disable" }}
                    <!-- Icon -->
                    <div class="shrink-0">
                            <i class="fa-brands fa-angellist text-5xl text-red"></i>
                    </div>
                    {{ end }}
                    
                    <!-- Text Content -->
                    <div class="text-center md:text-left">
                        {{ with .subheading }}
                        <h4 class="text-white text-xl uppercase font-poppins leading-[1em] font-bold text-wrap">{{ . }}</h4>
                        {{ end }}
                        {{ with .heading }}
                        <h2 class="text-3xl md:text-[38px] font-poppins capitalize font-bold text-white mb-2">
                            {{ . }}
                        </h2>
                        {{ end }}
                        {{ with .text }}
                        <p class="text-white font-lato lg:text-lg">
                            {{ . }}
                        </p>
                        {{ end }}
                    </div>
                </div>
            </div>
            
            <!-- Right Content - Button -->
            <div class="shrink-0 w-full md:w-auto flex justify-center">
                <a href="{{ site.Params.settings.cta_url }}"
                   class="px-5 py-2 bg-gray inline-flex mx-auto text-white font-lato justify-between items-center gap-2 hover:bg-blue transition-colors duration-700"
                   role="button"
                   aria-label="CONTACTEZ NOUS !">
                    <span class="text-lg">CONTACTEZ NOUS !</span>
                    <i class="fa-solid fa-angles-right text-inherit"></i>
                </a>
            </div>
        </div>
    </div>
</div>
