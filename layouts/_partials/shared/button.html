{{ if eq "type" "button" }}
<button class="bg-red rounded-sm text-white font-lato uppercase px-7 py-3 block size-fit {{ .Params.class }}">{{ .text }}</button>
{{ else }}
<a href="{{ .url }}" class="bg-red rounded-sm text-white font-lato uppercase px-9.75 py-2.75 block size-fit {{ .Params.class }}">
    {{ .text }}
</a>
{{ end }}
