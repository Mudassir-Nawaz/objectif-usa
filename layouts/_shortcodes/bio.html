<div class="flex flex-col justify-center items-center {{ .Params.class }} not-prose">
    <img src="{{ .Params.portrait | relURL }}" alt="{{ .Params.Title }}" class="size-40 rounded-full">
    <h3 class="text-xl text-blue font-poppins leading-[1.3em] capitalize font-bold text-center text-wrap">{{ .Params.text | safeHTML }}</h3>
    <a href="{{ .Params.link }}" class="text-red uppercase text-center font-lato mt-5">{{ .Params.link_text }}</a>
</div>
