{{ $question := .Get "question" }}
{{ $answer := .Inner }}
{{ $icon_open := .Get "icon_open" | default "fa-regular fa-square-minus" }}
{{ $icon_closed := .Get "icon_closed" | default "fa-regular fa-square-plus" }}

<div class="faq-item border border-gray-200 rounded-lg overflow-hidden">
    <button class="faq-question-btn w-full gap-5 flex justify-between items-center p-4 bg-gray-50 hover:bg-gray-100 transition-all duration-300 text-left">
        <h3 class="text-lg font-medium text-gray-900 m-0 cursor-pointer">{{ $question | safeHTML }}</h3>
        <div class="faq-icon-wrapper relative w-5 h-5 flex items-center justify-center">
            <!-- Closed icon -->
            <i class="faq-icon-closed {{ $icon_closed }} text-gray-500 text-xl absolute inset-0 flex items-center justify-center transition-all duration-300"></i>
            <!-- Open icon -->
            <i class="faq-icon-open {{ $icon_open }} text-gray-500 text-xl absolute inset-0 flex items-center justify-center transition-all duration-300 opacity-0 scale-100"></i>
        </div>
    </button>
    <div class="faq-answer-content overflow-hidden transition-all duration-300 ease-in-out bg-white">
        <div class="p-4 border-t border-gray-100">
            <div class="prose max-w-none">
                {{ $answer | markdownify }}
            </div>
        </div>
    </div>
</div>
